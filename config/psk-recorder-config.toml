[station]
callsign    = "AC0G/B3"
grid_square = "EM38ww"

[paths]
spool_dir   = "/var/lib/psk-recorder"
log_dir     = "/var/log/psk-recorder"
decoder     = "/usr/local/bin/decode_ft8"
pskreporter = "/usr/local/bin/pskreporter-sender"
# pskreporter_tcp: TCP upload is supported by ftlib-pskreporter but broken
# in practice — the sender opens the connection, sends one packet, and
# never schedules another batch. Leave UDP (default) until the upstream
# TCP scheduling bug is fixed. Keep the flag wired for future use.
pskreporter_tcp = false
keep_wav    = false

[[radiod]]
id            = "bee3-rx888"
radiod_status = "bee3-status.local"

[radiod.ft8]
sample_rate = 12000
preset      = "usb"
encoding    = "s16be"
freqs_hz    = [
  1_840_000,  3_573_000,  5_357_000,  7_074_000, 10_136_000,
  14_074_000, 18_100_000, 21_074_000, 24_915_000, 28_074_000,
  50_313_000,
]

[radiod.ft4]
sample_rate = 12000
preset      = "usb"
encoding    = "s16be"
freqs_hz    = [
  3_575_000,  7_047_500, 10_140_000, 14_080_000,
  18_104_000, 21_140_000, 24_919_000, 28_180_000, 50_318_000,
]
